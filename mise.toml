[tools]
hk = "1.46.0"
rust = "1.96.0"
"cargo:cargo-dist" = "0.32.0"
"cargo:git-cliff" = "2.13.1"

[env]
HK_PKL_BACKEND = "pklr"

[tasks.release]
description = "Bump version, commit and push. Usage: mise run release <patch|minor|major>"
run = """
#!/usr/bin/env bash
set -euo pipefail

BUMP=${1:-patch}

CURRENT=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

case "$BUMP" in
  major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
  minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
  patch) PATCH=$((PATCH + 1)) ;;
  *) echo "Usage: mise run release <patch|minor|major>"; exit 1 ;;
esac

NEW="$MAJOR.$MINOR.$PATCH"

sed -i "s/^version = \\"$CURRENT\\"/version = \\"$NEW\\"/" Cargo.toml

git add Cargo.toml
git commit -m "chore(release): prepare for v$NEW"
git push

git tag "v$NEW"
git push origin "v$NEW"

echo "Released v$NEW"
"""
